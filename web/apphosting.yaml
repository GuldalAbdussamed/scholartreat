runConfig:
  runtime: nodejs20
  concurrency: 100
  cpu: 1
  memoryMiB: 512
  minInstances: 0

env:
  - variable: FIREBASE_PROJECT_ID
    value: ibw-2026
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@ibw-2026.iam.gserviceaccount.com
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
